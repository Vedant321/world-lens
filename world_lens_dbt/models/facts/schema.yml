version: 2

models:
  - name: fact_country_metrics
    description: Country-year metrics pivoted into analytics-ready columns

    columns:
      - name: country_code
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_country')
                field: country_code

      - name: year
        tests:
          - not_null

  - name: fact_indicator_values
    description: Long-format fact table containing World Bank observations.

    columns:
      - name: country_code
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_country')
                field: country_code

      - name: year
        tests:
          - not_null

      - name: indicator_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_indicator')
                field: indicator_id

      - name: metric_value